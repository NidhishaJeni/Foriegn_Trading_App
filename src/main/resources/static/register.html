<!DOCTYPE html>
<html>

<head>
 <meta charset="UTF-8">

    <title>Register</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>Create Account</h1>

        <input
                id="regUsername"
                type="text"
                placeholder="Username">

        <input
                id="regEmail"
                type="email"
                placeholder="Email">

        <input
                id="regPassword"
                type="password"
                placeholder="Password">

        <button onclick="register()">
            Register
        </button>

        <br><br>

        <a href="index.html">
            Back to Login
        </a>

    </div>

</div>

<script src="js/auth.js"></script>

</body>

</html>
