<!DOCTYPE html>
<html>

<head>
     <meta charset="UTF-8">

    <title>Trade Management</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
</head>

<body>

<!-- NAVIGATION -->
<nav>

    <h2>💹 Trading App</h2>

    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="trade.html">Trades</a></li>
        <li><a href="currency.html">Currency</a></li>
        <li><a href="report.html">Reports</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>

</nav>

<div class="container">

    <h1>Trade Management</h1>

    <!-- CREATE TRADE -->

    <div class="card">

        <h2>Create Trade</h2>

        <label>From Currency</label>

        <select id="fromCurrency">
            <option>USD</option>
            <option>EUR</option>
            <option>GBP</option>
            <option>JPY</option>
        </select>

        <label>To Currency</label>

        <select id="toCurrency">
            <option>INR</option>
            <option>USD</option>
            <option>EUR</option>
        </select>

        <label>Trade Type</label>

        <select id="tradeType">
            <option value="BUY">BUY</option>
            <option value="SELL">SELL</option>
        </select>

        <label>Amount</label>

        <input
            type="number"
            id="amount"
            placeholder="Enter Amount">

        <button onclick="createTrade()">
            Execute Trade
        </button>

    </div>

    <!-- TRADE HISTORY -->

    <div class="card">

        <h2>Trade History</h2>

        <table>

            <thead>

            <tr>

                <th>ID</th>
                <th>From</th>
                <th>To</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Converted</th>
                <th>Date</th>
                <th>Status</th>
                <th>Action</th>

            </tr>

            </thead>

            <tbody id="trade-list">

            </tbody>

        </table>

    </div>

</div>

<script src="js/common.js"></script>
<script src="js/trade.js"></script>

</body>
</html>
