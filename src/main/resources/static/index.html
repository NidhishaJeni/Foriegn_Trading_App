<!DOCTYPE html>

    <title>Trading App - Login</title>

<body>

<div class="container">

    <div class="card">

        <h1>💹 Trading App</h1>

        <h2>Login</h2>

        <input
                id="loginUsername"
                type="text"
                placeholder="Enter Username">

        <input
                id="loginPassword"
                type="password"
                placeholder="Enter Password">

        <button onclick="login()">
            Login
        </button>

        <br><br>

        <p>
            Don't have an account?
            <a href="register.html">Register Here</a>
        </p>

    </div>

</div>
